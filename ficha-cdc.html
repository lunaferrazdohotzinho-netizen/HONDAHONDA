<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nathaniel Honda Brasil | Ficha Cadastral - Adiante seu cadastro</title>
    <meta name="description" content="Ficha cadastral para análise de crédito - Nathaniel Honda Brasil">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-page-header">
        <h1>FICHA CADASTRAL CDC</h1>
        <p class="mb-0">Preencha seus dados para análise de crédito</p>
    </div>

    <div class="form-container">
        <form id="cdcForm">
            <h5 class="fw-bold mb-3" style="color: var(--text-title-color);">Dados Pessoais</h5>

            <div class="mb-3">
                <label for="nome" class="form-label">Nome Completo *</label>
                <input type="text" class="form-control" id="nome" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="dataNascimento" class="form-label">Data de Nascimento *</label>
                    <input type="date" class="form-control" id="dataNascimento" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="sexo" class="form-label">Sexo *</label>
                    <select class="form-control" id="sexo" required>
                        <option value="">Selecione</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="nomeMae" class="form-label">Nome da Mãe *</label>
                <input type="text" class="form-control" id="nomeMae" required>
            </div>

            <div class="mb-3">
                <label for="nomePai" class="form-label">Nome do Pai</label>
                <input type="text" class="form-control" id="nomePai">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="cpf" class="form-label">CPF *</label>
                    <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="rg" class="form-label">RG *</label>
                    <input type="text" class="form-control" id="rg" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">E-mail *</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="telefone" class="form-label">Telefone *</label>
                    <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000" required>
                </div>
            </div>

            <hr class="my-4">
            <h5 class="fw-bold mb-3" style="color: var(--text-title-color);">Endereço</h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="cep" class="form-label">CEP *</label>
                    <input type="text" class="form-control" id="cep" placeholder="00000-000" required>
                </div>
                <div class="col-md-8 mb-3">
                    <label for="rua" class="form-label">Rua *</label>
                    <input type="text" class="form-control" id="rua" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label for="numero" class="form-label">Número *</label>
                    <input type="text" class="form-control" id="numero" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label for="complemento" class="form-label">Complemento</label>
                    <input type="text" class="form-control" id="complemento">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="bairro" class="form-label">Bairro *</label>
                    <input type="text" class="form-control" id="bairro" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-8 mb-3">
                    <label for="cidade" class="form-label">Cidade *</label>
                    <input type="text" class="form-control" id="cidade" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="estado" class="form-label">Estado *</label>
                    <select class="form-control" id="estado" required>
                        <option value="">UF</option>
                        <option value="AC">AC</option>
                        <option value="AL">AL</option>
                        <option value="AP">AP</option>
                        <option value="AM">AM</option>
                        <option value="BA">BA</option>
                        <option value="CE">CE</option>
                        <option value="DF">DF</option>
                        <option value="ES">ES</option>
                        <option value="GO">GO</option>
                        <option value="MA">MA</option>
                        <option value="MT">MT</option>
                        <option value="MS">MS</option>
                        <option value="MG">MG</option>
                        <option value="PA">PA</option>
                        <option value="PB">PB</option>
                        <option value="PR">PR</option>
                        <option value="PE">PE</option>
                        <option value="PI">PI</option>
                        <option value="RJ">RJ</option>
                        <option value="RN">RN</option>
                        <option value="RS">RS</option>
                        <option value="RO">RO</option>
                        <option value="RR">RR</option>
                        <option value="SC">SC</option>
                        <option value="SP">SP</option>
                        <option value="SE">SE</option>
                        <option value="TO">TO</option>
                    </select>
                </div>
            </div>

            <hr class="my-4">
            <h5 class="fw-bold mb-3" style="color: var(--text-title-color);">Dados Financeiros</h5>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="profissao" class="form-label">Profissão *</label>
                    <input type="text" class="form-control" id="profissao" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="renda" class="form-label">Renda Mensal *</label>
                    <input type="text" class="form-control" id="renda" placeholder="R$ 0,00" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="empresa" class="form-label">Empresa onde trabalha</label>
                <input type="text" class="form-control" id="empresa">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="tempoEmprego" class="form-label">Tempo de emprego</label>
                    <input type="text" class="form-control" id="tempoEmprego">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="telefoneEmpresa" class="form-label">Telefone da empresa</label>
                    <input type="tel" class="form-control" id="telefoneEmpresa">
                </div>
            </div>

            <hr class="my-4">
            <h5 class="fw-bold mb-3" style="color: var(--text-title-color);">Referências</h5>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="ref1Nome" class="form-label">Nome da referência 1</label>
                    <input type="text" class="form-control" id="ref1Nome">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="ref1Tel" class="form-label">Telefone da referência 1</label>
                    <input type="tel" class="form-control" id="ref1Tel">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="ref2Nome" class="form-label">Nome da referência 2</label>
                    <input type="text" class="form-control" id="ref2Nome">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="ref2Tel" class="form-label">Telefone da referência 2</label>
                    <input type="tel" class="form-control" id="ref2Tel">
                </div>
            </div>

            <button type="submit" class="btn-submit">Enviar ficha para análise</button>
        </form>

        <div class="text-center mt-4">
            <a href="index.html" style="color: var(--btn-primary-color);">← Voltar para o site</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('cdcForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const cpf = document.getElementById('cpf').value;
            const telefone = document.getElementById('telefone').value;
            const email = document.getElementById('email').value;
            const dataNascimento = document.getElementById('dataNascimento').value;
            const nomeMae = document.getElementById('nomeMae').value;
            const rua = document.getElementById('rua').value;
            const numero = document.getElementById('numero').value;
            const bairro = document.getElementById('bairro').value;
            const cidade = document.getElementById('cidade').value;
            const estado = document.getElementById('estado').value;
            const profissao = document.getElementById('profissao').value;
            const renda = document.getElementById('renda').value;

            const msg = `*FICHA CDC - ANÁLISE DE CRÉDITO*\n\n` +
                `*Nome:* ${nome}\n` +
                `*CPF:* ${cpf}\n` +
                `*Data Nasc:* ${dataNascimento}\n` +
                `*Telefone:* ${telefone}\n` +
                `*E-mail:* ${email}\n` +
                `*Mãe:* ${nomeMae}\n` +
                `*Endereço:* ${rua}, ${numero} - ${bairro}, ${cidade}/${estado}\n` +
                `*Profissão:* ${profissao}\n` +
                `*Renda:* ${renda}`;

            window.open(`https://wa.me/5568999880713?text=${encodeURIComponent(msg)}`, '_blank');
        });
    </script>
</body>

</html>
